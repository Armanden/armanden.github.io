<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wordle Clone</title>
<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    background-color: #121213;
    color: white;
  }

  h1 {
    margin-top: 20px;
  }

  #board {
    display: grid;
    grid-template-rows: repeat(6, 1fr);
    gap: 5px;
    width: 300px;
    margin: 20px auto;
  }

  .row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 5px;
  }

  .tile {
    width: 55px;
    height: 55px;
    border: 2px solid #3a3a3c;
    font-size: 2rem;
    font-weight: bold;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: #121213;
  }

  .correct {
    background-color: #538d4e;
    border: none;
  }

  .present {
    background-color: #b59f3b;
    border: none;
  }

  .absent {
    background-color: #3a3a3c;
    border: none;
  }

  #message {
    margin-top: 15px;
    font-size: 1.2rem;
  }

  button {
    margin-top: 15px;
    padding: 8px 15px;
    font-size: 1rem;
    cursor: pointer;
  }
</style>
</head>
<body>

<h1>Wordle</h1>
<div id="board"></div>
<div id="message"></div>
<button onclick="resetGame()">New Game</button>
<br><br>
	  <a href="gindex.html">Back to Gamespage</a><br><br>
 <a href="../../index.html">Back to Homepage</a>
    


 <script>
   const words = [
"APPLE","GRAPE","MANGO","BERRY","PEACH","LEMON","PLUMB","GUAVA","MELON","OLIVE",
"CHILI","BASIL","ONION","GARLI","RADIS","CARRO","TOMAT","BEANS","RICEE","WHEAT",
"TIGER","LIONN","ZEBRA","HORSE","PANDA","KOALA","OTTER","MOUSE","SHEEP","GOOSE",
"EAGLE","CROWL","ROBIN","SWANL","SHARK","WHALE","SQUID","SNAKE","FROGS","CRANE",
"PLANE","TRAIN","TRUCK","SCOOT","BIKER","BOATS","YACHT","SKATE","METRO","TAXIS",
"CHAIR","TABLE","COUCH","SHELF","CLOCK","PHONE","RADIO","SPEAK","LIGHT","CABLE",
"BRICK","STONE","STEEL","GLASS","PAPER","PENNY","BRUSH","PAINT","FRAME","FLOOR",
"WALLS","ROOFY","DOORS","WINDOW","PLANT","GRASS","TREES","RIVER","OCEAN","LAKES",
"BEACH","HILLS","PLAIN","FIELD","FORET","DESRT","CLOUD","STORM","RAINY","SNOWY",
"WINDY","SUNNY","FOGGY","MISTY","DUSTY","SMOKE","FLAME","SPARK","ASHES","EMBER",
"SPACE","STARS","COMET","ORBIT","ROBOT","DRONE","LASER","RADAR","CHIPS","CODES",
"LOGIC","PIXEL","IMAGE","VIDEO","AUDIO","MEDIA","PRESS","PRINT","WRITE","READS",
"STUDY","LEARN","TEACH","CLASS","GRADE","EXAMS","NOTES","BOOKS","NOVEL","POEMS",
"STORY","PLOTX","SCENE","ACTOR","DRAMA","MOVIE","FILMS","MUSIC","SONGS","DANCE",
"PIANO","GUITR","DRUMS","VIOLA","FLUTE","SINGR","VOICE","SOUND","NOISE","QUIET",
"LAUGH","SMILE","CRYER","ANGER","HAPPY","SADLY","BRAVE","PROUD","FAITH","TRUST",
"PEACE","UNITY","HONOR","GLORY","POWER","MIGHT","FORCE","SPEED","QUICK","SLOWW",
"EARTH","WATER","FIRES","WINDS","METAL","SOLID","LIQID","GASES","PLASM","FORMS",
"SWEET","SALTY","SOURR","BITTR","SPICY","TASTY","FRESH","RIPEN","BAKED","FRIED",
"BOILE","STEAM","GRILL","ROAST","SLICE","CHOPP","MIXER","BLEND","SERVE","PLATE",
"CROWN","THRONE","SWORD","SHIEL","ARMOR","ARROW","BOWLS","MAGIC","SPELL","WITCH",
"ANGEL","DEMON","GIANT","DWARF","ELVES","FAIRY","QUEST","TRIAL","FINAL","BEGIN",
"START","ENDUR","EARLY","LATER","TODAY","NIGHT","MORNG","NOONS","EVENS","DAWNS",
"MONTH","YEARS","DAILY","WEEKS","TIMES","CLOCK","WATCH","ALARM","TIMER","COUNT",
"MARCH","APRIL","MAYBE","JUNES","JULYS","AUGST","SEPTM","OCTOB","NOVEM","DECEM",
"ALPHA","BRAVO","CHARL","DELTA","EAGLE","FOCUS","GRACE","HOUSE","INDEX","JELLY",
"KARMA","LEVEL","MATCH","NORTH","OASIS","PRIME","QUART","RANGE","SCALE","TREND",
"UNION","VALUE","WORLD","YOUTH","ZONAL","BLADE","CLIMB","DREAM","ENJOY","FRONT",
"GROUP","HEART","IDEAL","JUDGE","KNIFE","LAYER","MODEL","NURSE","OFFER","PRICE"
   ];

let secretWord = words[Math.floor(Math.random() * words.length)];
let currentRow = 0;
let currentTile = 0;
let gameOver = false;

const board = document.getElementById("board");
const message = document.getElementById("message");

// Create board
for (let r = 0; r < 6; r++) {
  const row = document.createElement("div");
  row.classList.add("row");
  for (let c = 0; c < 5; c++) {
    const tile = document.createElement("div");
    tile.classList.add("tile");
    row.appendChild(tile);
  }
  board.appendChild(row);
}

document.addEventListener("keydown", handleKey);

function handleKey(e) {
  if (gameOver) return;

  if (e.key === "Backspace") {
    if (currentTile > 0) {
      currentTile--;
      getTile(currentRow, currentTile).textContent = "";
    }
  } else if (e.key === "Enter") {
    if (currentTile === 5) checkGuess();
  } else if (/^[a-zA-Z]$/.test(e.key)) {
    if (currentTile < 5) {
      getTile(currentRow, currentTile).textContent = e.key.toUpperCase();
      currentTile++;
    }
  }
}

function getTile(row, col) {
  return board.children[row].children[col];
}

function checkGuess() {
  let guess = "";
  for (let i = 0; i < 5; i++) {
    guess += getTile(currentRow, i).textContent;
  }

  if (guess.length < 5) return;

  for (let i = 0; i < 5; i++) {
    const tile = getTile(currentRow, i);
    if (guess[i] === secretWord[i]) {
      tile.classList.add("correct");
    } else if (secretWord.includes(guess[i])) {
      tile.classList.add("present");
    } else {
      tile.classList.add("absent");
    }
  }

  if (guess === secretWord) {
    message.textContent = "You guessed it!";
    gameOver = true;
    return;
  }

  currentRow++;
  currentTile = 0;

  if (currentRow === 6) {
    message.textContent = "Game Over! Word was: " + secretWord;
    gameOver = true;
  }
}

function resetGame() {
  secretWord = words[Math.floor(Math.random() * words.length)];
  currentRow = 0;
  currentTile = 0;
  gameOver = false;
  message.textContent = "";

  for (let r = 0; r < 6; r++) {
    for (let c = 0; c < 5; c++) {
      const tile = getTile(r, c);
      tile.textContent = "";
      tile.className = "tile";
    }
  }
}
</script>

</body>
</html>
