<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Box Filler - Tangent Sweep</title>
<style>
    body {
        margin: 0;
        background: black;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }
    canvas {
        background: black;
    }
</style>
</head>
<body>

<canvas id="canvas" width="800" height="600"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// Box parameters
const box = {
    x: 250,
    y: 200,
    w: 300,
    h: 200
};

// Sweep parameters
const start = {
    x: box.x,
    y: box.y
};

let angle = 0;
const angleStep = 1;
const maxAngle = 90 * Math.PI / 180; // 90 degrees in radians

function draw() {
    // DO NOT clear screen to mimic raylib persistent drawing

    // Draw box frame
    ctx.strokeStyle = "gray";
    ctx.strokeRect(box.x, box.y, box.w, box.h);

    const angleRad = angle * Math.PI / 180;

    if (angleRad <= maxAngle) {
        const dirX = Math.cos(angleRad);
        const dirY = Math.sin(angleRad);

        let t = Infinity;

        const tRight  = (box.x + box.w - start.x) / dirX;
        const tLeft   = (box.x - start.x) / dirX;
        const tBottom = (box.y + box.h - start.y) / dirY;
        const tTop    = (box.y - start.y) / dirY;

        if (tRight > 0)  t = Math.min(t, tRight);
        if (tLeft > 0)   t = Math.min(t, tLeft);
        if (tBottom > 0) t = Math.min(t, tBottom);
        if (tTop > 0)    t = Math.min(t, tTop);

        const endX = start.x + dirX * t;
        const endY = start.y + dirY * t;

        // Draw line
        ctx.strokeStyle = "red";
        ctx.beginPath();
        ctx.moveTo(start.x, start.y);
        ctx.lineTo(endX, endY);
        ctx.stroke();
    }

    // Increment angle
    angle += angleStep;
    if (angle >= 360) angle = 0;

    requestAnimationFrame(draw);
}

// Initial background fill ONCE (like raylib ClearBackground before loop)
ctx.fillStyle = "black";
ctx.fillRect(0, 0, canvas.width, canvas.height);

draw();
</script>

</body>
</html>
